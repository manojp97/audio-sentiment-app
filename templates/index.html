<!DOCTYPE html>
<html>
<head>
<title>Audio Sentiment Analyzer</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    width:450px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:20px;
    color:#333;
}

input[type="file"]{
    margin-bottom:15px;
    padding:8px;
}

button{
    background:#4facfe;
    border:none;
    padding:10px 20px;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#008cff;
}

h3{
    margin-top:25px;
    color:#444;
}

p{
    background:#f3f3f3;
    padding:10px;
    border-radius:6px;
    min-height:30px;
    font-size:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Upload Audio File</h2>

<input type="file" id="audioFile">
<br>
<button onclick="uploadAudio()">Upload</button>

<h3>Transcription</h3>
<p id="text"></p>

<h3>Sentiment</h3>
<p id="sentiment"></p>

</div>

<script>

async function uploadAudio(){

    let fileInput = document.getElementById("audioFile");
    let file = fileInput.files[0];

    let formData = new FormData();
    formData.append("audio", file);

    let response = await fetch("/upload",{
        method:"POST",
        body:formData
    });

    let data = await response.json();

    document.getElementById("text").innerText = data.transcription;
    document.getElementById("sentiment").innerText = JSON.stringify(data.sentiment);

}

</script>

</body>
</html>
